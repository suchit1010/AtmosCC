name: Sui Move CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  move-build-test:
    name: Build & Test Move Contracts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Sui CLI
        run: |
          cargo install --locked \
            --git https://github.com/MystenLabs/sui.git \
            --branch testnet-v1.40.1 \
            sui
        env:
          CARGO_TERM_COLOR: always

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Verify Sui version
        run: sui --version

      - name: Build Move contracts
        run: sui move build

      - name: Run Move tests
        run: sui move test --coverage

  backend-build:
    name: TypeScript Backend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-for-ci-minimum-32-chars
          JWT_REFRESH_SECRET: test-refresh-for-ci-minimum-32-chars
          SUI_NETWORK: testnet
